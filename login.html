<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hostel Portal | Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-card">
        <h2>Student Login</h2>
        <form id="login-form">
            <div class="input-group">
                <input type="text" id="login-username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" id="login-pass" placeholder="Password" required>
                <span class="toggle-password">👁️</span>
            </div>

            <div class="captcha-container">
                <div class="captcha-box" id="captcha-equation">? * ? =</div>
                <input type="number" id="captcha-answer" placeholder="Answer" required>
            </div>

            <button type="submit" id="login-btn" class="btn-primary">Sign In</button>
        </form>

        <div class="footer-links">
            <a href="#">Forgot Password?</a> <br><br>
            New Student? <a href="signup.html">Register Here</a>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
